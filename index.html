<!DOCTYPE html>
<html>
<head>
  <title>Buy OTP Numbers</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #020024, #090979, #000000);
      font-family: Arial, sans-serif;
      color: white;
    }

    .box {
      text-align: center;
      width: 90%;
      max-width: 420px;
      margin: auto;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    select {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 13px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      height: 44px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #00c853, #009624);
      border: none;
      color: white;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 12px;
    }

    .price {
      margin-top: 10px;
      font-size: 16px;
      font-weight: bold;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Buy OTP Numbers 📱</h1>

  <div class="subtitle">
    Fast • Secure • Reliable <br>
    Global virtual numbers for all countries <br>
    Activate accounts instantly with real-time OTP delivery
  </div>

  <select id="country"></select>

  <select id="service"></select>

  <input type="email" id="email" placeholder="Enter your email">

  <div id="priceBox" class="price">Price: ₦6000</div>

  <button id="buyBtn">Buy OTP</button>

  <div class="footer">
    Trusted worldwide • Instant activation • 24/7 availability
  </div>
</div>

<script>
async function loadData() {
  try {
    const countrySelect = document.getElementById("country");
    const serviceSelect = document.getElementById("service");
    const priceBox = document.getElementById("priceBox");

    async function fetchData(url) {
      const res = await fetch(url);
      return await res.json();
    }

    // 🌍 LOAD COUNTRIES
    const countries = await fetchData("https://otp-backend-srw4.onrender.com/countries");

    countrySelect.innerHTML = "";

    countries.slice(0, 50).forEach(c => {
      const option = document.createElement("option");
      option.value = c;
      option.text = c.toUpperCase();
      countrySelect.appendChild(option);
    });

    // 📱 LOAD SERVICES
    async function loadServices() {
      const selectedCountry = countrySelect.value;

      const services = await fetchData(
        `https://otp-backend-srw4.onrender.com/services?country=${selectedCountry}`
      );

      serviceSelect.innerHTML = "";

      services.slice(0, 100).forEach(s => {
        const option = document.createElement("option");
        option.value = s;
        option.text = s;
        serviceSelect.appendChild(option);
      });

      updatePrice();
    }

    function updatePrice() {
      const total = 6000;
      priceBox.innerText = "Price: ₦" + total;
    }

    await loadServices();

    countrySelect.addEventListener("change", loadServices);
    serviceSelect.addEventListener("change", updatePrice);

  } catch (err) {
    alert("Error loading data. Please refresh.");
    console.log(err);
  }
}

// 🟢 BUY BUTTON
document.getElementById("buyBtn").addEventListener("click", () => {
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Please enter your email");
    return;
  }

  alert("Next: payment integration 💰");
});

loadData();
</script>

</body>
</html>
