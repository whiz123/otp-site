<!DOCTYPE html>
<html>
<head>
  <title>OTP Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111;
    }

    .topbar {
      background: linear-gradient(90deg, #007bff, #00c6ff);
      color: white;
      padding: 10px;
      overflow: hidden;
      white-space: nowrap;
    }

    .scroll {
      display: inline-block;
      animation: scrollText 12s linear infinite;
    }

    @keyframes scrollText {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    h1 { font-size: 26px; margin-bottom: 5px; }

    .subtitle {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    select, input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #007bff, #0056d2);
      border: none;
      color: white;
      font-size: 17px;
      border-radius: 10px;
      cursor: pointer;
    }

    .price {
      margin: 10px 0;
      font-weight: bold;
      font-size: 16px;
      color: #007bff;
    }
  </style>
</head>

<body>

<div class="container">

<h1>OTP Service 📱</h1>
<div class="subtitle">Buy virtual numbers instantly</div>

<!-- BALANCE -->
<div style="background:#fff;padding:20px;border-radius:16px;margin-bottom:20px;">
  <div style="display:flex;justify-content:space-between;">
    <span>Balance</span>
    <span onclick="openFund()" style="cursor:pointer;background:#2d6cdf;color:#fff;padding:4px 10px;border-radius:12px;">+Fund</span>
  </div>
  <h2>₦<span id="balance">0</span></h2>
</div>

<div class="card">

<select id="country"></select>
<select id="service"></select>
<input type="email" id="email" placeholder="Enter your email">

<div id="priceBox">Loading price...</div>

<button id="buyBtn">Pay & Get OTP</button>

</div>

</div>

<!-- FUND MODAL -->
<div id="fundModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;">
  <div style="background:#fff;padding:20px;border-radius:12px;width:300px;">
    <h3>Fund Wallet</h3>
    <input id="fundAmount" type="number" placeholder="Amount">
    <button onclick="payNow()">Fund Now</button>
    <button onclick="closeFund()">Cancel</button>
  </div>
</div>

<script src="https://korablobstorage.blob.core.windows.net/modal-bucket/korapay-collections.min.js"></script>

<script>

const API = "https://otp-backend-srw4.onrender.com";

// LOAD DATA
async function loadData() {
  const countries = await fetch(API+"/countries").then(r=>r.json());
  const countrySelect = document.getElementById("country");

  countries.forEach(c=>{
    let o=document.createElement("option");
    o.value=c;
    o.text=c;
    countrySelect.appendChild(o);
  });

  loadServices();
}

async function loadServices(){
  const c=document.getElementById("country").value;
  const services=await fetch(API+"/services?country="+c).then(r=>r.json());

  const s=document.getElementById("service");
  s.innerHTML="";

  services.forEach(x=>{
    let o=document.createElement("option");
    o.value=x;
    o.text=x;
    s.appendChild(o);
  });

  updatePrice();
}

async function updatePrice(){
  const c=document.getElementById("country").value;
  const s=document.getElementById("service").value;

  const data=await fetch(`${API}/price?country=${c}&service=${s}`).then(r=>r.json());

  document.getElementById("priceBox").innerText="₦"+data.price;
  window.currentPrice=data.price;
}

// FUND WALLET
function openFund(){document.getElementById("fundModal").style.display="flex";}
function closeFund(){document.getElementById("fundModal").style.display="none";}

function payNow(){
  const amount=document.getElementById("fundAmount").value;
  const email=document.getElementById("email").value;

  fetch(`${API}/fund-wallet`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,amount:Number(amount)})
  })
  .then(res=>res.json())
  .then(data=>{
    if(data?.data?.checkout_url){
      window.location.href=data.data.checkout_url;
    }else{
      alert("Payment failed");
    }
  });
}

// BUY OTP (NO KORAPAY)
document.getElementById("buyBtn").onclick=()=>{
  const country=document.getElementById("country").value;
  const service=document.getElementById("service").value;
  const email=document.getElementById("email").value;

  localStorage.setItem("country",country);
  localStorage.setItem("service",service);
  localStorage.setItem("user_email",email);
  localStorage.setItem("price",window.currentPrice);

  window.location.href="success.html?type=otp";
};

document.getElementById("country").onchange=loadServices;
document.getElementById("service").onchange=updatePrice;

loadData();

</script>

</body>
</html>
