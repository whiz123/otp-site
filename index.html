<!DOCTYPE html>

<html>
<head>
  <title>OTP Store</title>

  <!-- Mobile Responsive -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- KORAPAY SCRIPT (MUST LOAD FIRST) -->

  <script src="https://korablobstorage.blob.core.windows.net/modal-bucket/korapay-collections.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
    }

    .box {
      width: 90%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
      font-size: 16px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>

</head>

<body>

  <div class="box">
    <h1>Buy OTP Numbers 📲</h1>
    <p>Fast • Secure • Reliable</p>

```
<input type="email" id="email" placeholder="Enter your email">

<button onclick="buyOTP()">Buy OTP</button>

<div class="status" id="status"></div>
```

  </div>

  <script>
    function buyOTP() {
      const email = document.getElementById("email").value;
      const status = document.getElementById("status");

      // Validate email
      if (!email) {
        alert("Enter your email ❗");
        return;
      }

      // Check Korapay loaded
      if (typeof Korapay === "undefined") {
        alert("Payment system not loaded ❌ Refresh page");
        return;
      }

      status.innerText = "Opening payment...";

      Korapay.initialize({
        key: pk_live_TggCQduimqKmNaHFq9Awp5SNsXsh98rH8W4uCVxq // 🔴 REPLACE THIS
        reference: "OTP_" + Date.now(),
        amount: 400000, // ₦4000
        currency: "NGN",

        customer: {
          name: "Customer",
          email: email
        },

        onSuccess: function () {
          status.innerText = "Payment successful ✅";

          // 👉 NEXT STEP (your real API will go here later)
          alert("Payment successful! OTP will be delivered.");
        },

        onClose: function () {
          status.innerText = "Payment cancelled ❌";
        }
      });
    }
  </script>

</body>
</html>
