<!DOCTYPE html>
<html>
<head>
  <title>Buy OTP Numbers</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #020024, #090979, #000000);
      font-family: Arial;
      color: white;
    }

    .box {
      text-align: center;
      width: 95%;
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 25px;
    }

    select, input {
      width: 100%;
      padding: 18px;
      margin: 12px 0;
      border-radius: 12px;
      border: none;
      font-size: 18px;
    }

    button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(90deg, #00c853, #009624);
      border: none;
      color: white;
      font-size: 20px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:active {
      transform: scale(0.97);
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 28px;
      }

      select, input, button {
        font-size: 18px;
        padding: 16px;
      }
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Buy OTP Numbers 📱</h1>

  <select id="country"></select>

  <select id="service"></select>

  <input type="email" id="email" placeholder="Enter email">

  <button id="buyBtn">Buy OTP</button>
</div>

<script>
async function loadData() {
  try {
    const countrySelect = document.getElementById("country");
    const serviceSelect = document.getElementById("service");

    async function fetchWithRetry(url, retries = 3) {
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error("Network error");
          return await res.json();
        } catch (err) {
          if (i === retries - 1) throw err;
          await new Promise(r => setTimeout(r, 2000));
        }
      }
    }

    // LOAD COUNTRIES
    const countries = await fetchWithRetry("https://otp-backend-srw4.onrender.com/countries");

    countrySelect.innerHTML = "";
    countries.forEach(c => {
      const option = document.createElement("option");
      option.value = c;
      option.text = c.toUpperCase();
      countrySelect.appendChild(option);
    });

    // LOAD SERVICES
    async function loadServices() {
      serviceSelect.innerHTML = "<option>Loading...</option>";

      const selectedCountry = countrySelect.value;

      const services = await fetchWithRetry(
        `https://otp-backend-srw4.onrender.com/services?country=${selectedCountry}`
      );

      serviceSelect.innerHTML = "";

      services.forEach(s => {
        const option = document.createElement("option");
        option.value = s;
        option.text = s;
        serviceSelect.appendChild(option);
      });
    }

    await loadServices();

    countrySelect.addEventListener("change", loadServices);

  } catch (err) {
    alert("Error loading data. Refresh page.");
    console.log(err);
  }
}

// BUTTON CLICK
document.getElementById("buyBtn").addEventListener("click", () => {
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Enter email");
    return;
  }

  alert("Next step: pricing + payment 💰");
});

loadData();
</script>

</body>
</html>
