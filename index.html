  </div>

  <script>
    function payNow() {
      const email = document.getElementById("email").value;

      if (!email) {
        alert("Enter your email ❗");
        return;
      }

      const amount = 4000;

      const url =
        "https://checkout.korapay.com/pay" +
        "?amount=" + amount +
        "&currency=NGN" +
        "&reference=OTP_" + Date.now() +
        "&customer_email=" + encodeURIComponent(email);

      window.location.href = url;
    }
  </script>
