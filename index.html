<!DOCTYPE html>
<html>
<head>
  <title>OTP Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111;
    }

    .topbar {
      background: linear-gradient(90deg, #007bff, #00c6ff);
      color: white;
      padding: 10px;
      overflow: hidden;
      white-space: nowrap;
    }

    .scroll {
      display: inline-block;
      animation: scrollText 12s linear infinite;
    }

    @keyframes scrollText {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      overflow: hidden; /* ✅ FIX */
    }

    /* ✅ FIXED INPUT OVERFLOW */
    select, input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 15px;
      box-sizing: border-box; /* 🔥 MAIN FIX */
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #007bff, #0056d2);
      border: none;
      color: white;
      font-size: 17px;
      border-radius: 10px;
      cursor: pointer;
    }

    .price {
      margin: 10px 0;
      font-weight: bold;
      font-size: 16px;
      color: #007bff;
    }

    .mini-cards {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      gap: 8px;
    }

    .mini {
      flex: 1;
      background: #ffffff;
      padding: 10px;
      border-radius: 10px;
      font-size: 11px;
      text-align: center;
      box-shadow: 0 5px 12px rgba(0,0,0,0.06);
    }

    .trust {
      margin-top: 20px;
      font-size: 13px;
      color: #555;
      text-align: center;
    }

    .support {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #0088cc;
      color: white;
      padding: 12px 16px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 14px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

  </style>
</head>

<body>

<div class="topbar">
  <div class="scroll">
    ⚡ Instant OTP Delivery • 🔒 Secure Payments • 🌍 Trusted by 10,000+ users • 💬 24/7 Support
  </div>
</div>

<div class="container">

  <h1>OTP Service 📱</h1>
  <div class="subtitle">
    Buy virtual numbers instantly and receive OTP in seconds
  </div>

  <div class="card">

    <select id="country"></select>
    <select id="service"></select>

    <input type="email" id="email" placeholder="Enter your email">

    <div id="priceBox" class="price">Price: Loading...</div>

    <button id="buyBtn">Pay & Get OTP</button>

    <div class="mini-cards">
      <div class="mini">⚡ Fast</div>
      <div class="mini">🔒 Secure</div>
      <div class="mini">🌍 Global</div>
    </div>

  </div>

  <div class="trust">
    Secure checkout powered by Korapay
  </div>

</div>

<a href="https://t.me/payboostify_support" class="support">💬 Support</a>

<script>
 function saveSelection(country, service) {
  localStorage.setItem("country", country);
  localStorage.setItem("service", service);
} 
const API = "https://otp-backend-srw4.onrender.com";

function formatService(name) {
  return name
    .replace("whatsapp", "WhatsApp")
    .replace("telegram", "Telegram")
    .replace("facebook", "Facebook")
    .replace("instagram", "Instagram")
    .replace("twitter", "Twitter")
    .replace("tiktok", "TikTok");
}

async function updatePrice() {
  const country = document.getElementById("country").value;
  const service = document.getElementById("service").value;
  const priceBox = document.getElementById("priceBox");

  if (!country || !service) return;

  try {
    const res = await fetch(`${API}/price?country=${country}&service=${service}`);
    const data = await res.json();

    priceBox.innerHTML = `
<span style="color:#888;font-size:14px;">
From ₦1,500 – ₦6,500 depending on country
</span><br>
<strong style="font-size:18px;">
₦${data.price}
</strong>
`;
    window.currentPrice = data.price;
  } catch {
    priceBox.innerText = "Error loading price";
  }
}

async function loadData() {
  const countrySelect = document.getElementById("country");
  const serviceSelect = document.getElementById("service");

  const countries = await fetch(API + "/countries").then(r => r.json());

  countries.forEach(c => {
    const option = document.createElement("option");
    option.value = c;
    option.text = c.toUpperCase();
    countrySelect.appendChild(option);
  });

  async function loadServices() {
    const country = countrySelect.value;

    const services = await fetch(`${API}/services?country=${country}`).then(r => r.json());

    serviceSelect.innerHTML = "";

    services.forEach(s => {
      const option = document.createElement("option");
      option.value = s;
      option.text = formatService(s);
      serviceSelect.appendChild(option);
    });

    updatePrice();
  }

  await loadServices();

  countrySelect.addEventListener("change", loadServices);
  serviceSelect.addEventListener("change", updatePrice);
}

document.getElementById("buyBtn").addEventListener("click", async () => {
  const country = document.getElementById("country").value;
  const service = document.getElementById("service").value;
  const email = document.getElementById("email").value;
  const amount = window.currentPrice;

  if (!email) return alert("Enter your email");

  try {
    const res = await fetch(`${API}/create-payment`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        amount,
        country,
        service
      })
    });

    const data = await res.json();

    if (data && data.data && data.data.checkout_url) {
      saveSelection(country, service);
      window.location.href = data.data.checkout_url;
    } else {
      console.log(data);
      alert(JSON.stringify(data));
    }

  } catch (err) {
    console.log(err);
    alert("Payment failed");
  }
});

loadData();
</script>

</body>
</html>
