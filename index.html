<!DOCTYPE html>
<html>
<head>
  <title>Buy OTP Numbers</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #020024, #090979, #000000);
      font-family: Arial;
      color: white;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 18px;
      font-size: 20px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Buy OTP Numbers 📱</h1>
    <p>Fast • Secure • Reliable</p>

    <input type="email" id="email" placeholder="Enter your email" />

    <button onclick="buyOTP()">Buy OTP</button>
  </div>

  <script>
    async function buyOTP() {
      const email = document.getElementById("email").value;

      if (!email) {
        alert("Enter your email ❗");
        return;
      }

      try {
        const res = await fetch("https://otp-backend-srw4.onrender.com/pay", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (data.checkout_url) {
          window.location.href = data.checkout_url;
        } else {
          alert("Payment error ❌");
        }

      } catch (err) {
        alert("Server error ❌");
      }
    }
  </script>

</body>
</html>
