<!DOCTYPE html>
<html>
<head>
  <title>OTP Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      margin: 0;
      background: #020617;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .card {
      background: #0f172a;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    select, input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #1e293b;
      background: #020617;
      color: white;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .price {
      margin-top: 15px;
      font-size: 15px;
      color: #38bdf8;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      background: #020617;
      display: none;
    }

    .result h3 {
      margin: 5px 0;
    }

    .otp {
      font-size: 26px;
      color: #22c55e;
      font-weight: bold;
    }

    .copy-btn {
      margin-top: 10px;
      background: #334155;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>OTP Service 📱</h1>
    <div class="subtitle">
      Instant verification • Global numbers • Real-time OTP
    </div>

    <select id="country"></select>
    <select id="service"></select>

    <input type="email" id="email" placeholder="Enter your email">

    <div id="priceBox" class="price">Price: Loading...</div>

    <button id="buyBtn">Buy OTP</button>

    <div id="resultBox" class="result"></div>

    <div class="footer">
      🔒 Secure • ⚡ Instant • 🌍 Worldwide
    </div>

  </div>
</div>

<script>

const API = "https://otp-backend-srw4.onrender.com";

function formatService(name) {
  return name
    .replace("whatsapp", "WhatsApp")
    .replace("telegram", "Telegram")
    .replace("facebook", "Facebook")
    .replace("instagram", "Instagram")
    .replace("twitter", "Twitter")
    .replace("tiktok", "TikTok")
    .replace("googlevoice", "Google Voice")
    .replace("youtube", "YouTube")
    .replace("google", "Google");
}

async function updatePrice() {
  const country = country.value;
  const service = service.value;

  if (!country || !service) return;

  priceBox.innerText = "Loading price...";

  try {
    const res = await fetch(`${API}/price?country=${country}&service=${service}`);
    const data = await res.json();

    priceBox.innerText = "Price: ₦" + data.price;
  } catch {
    priceBox.innerText = "Error loading price";
  }
}

async function loadData() {
  const countries = await fetch(API + "/countries").then(r => r.json());

  country.innerHTML = "";
  countries.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.text = c.toUpperCase();
    country.appendChild(opt);
  });

  async function loadServices() {
    service.innerHTML = "<option>Loading...</option>";

    const services = await fetch(`${API}/services?country=${country.value}`).then(r => r.json());

    service.innerHTML = "";
    services.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s;
      opt.text = formatService(s);
      service.appendChild(opt);
    });

    updatePrice();
  }

  await loadServices();

  country.addEventListener("change", loadServices);
  service.addEventListener("change", updatePrice);
}

document.getElementById("buyBtn").addEventListener("click", async () => {
  if (!email.value) {
    alert("Enter email");
    return;
  }

  resultBox.style.display = "block";
  resultBox.innerHTML = "⏳ Buying number...";

  try {
    const res = await fetch(`${API}/buy?country=${country.value}&service=${service.value}`);
    const data = await res.json();

    if (!data.id) {
      resultBox.innerHTML = "❌ Failed: " + JSON.stringify(data);
      return;
    }

    const phone = data.phone;
    const id = data.id;

    resultBox.innerHTML = `
      <p>📱 Number:</p>
      <h3>${phone}</h3>
      <p>⏳ Waiting for OTP...</p>
    `;

    let tries = 0;

    const interval = setInterval(async () => {
      tries++;

      const check = await fetch(`${API}/check?id=${id}`);
      const checkData = await check.json();

      if (checkData.sms && checkData.sms.length > 0) {
        clearInterval(interval);

        const otp = checkData.sms[0].code;

        resultBox.innerHTML = `
          <p>📱 Number:</p>
          <h3>${phone}</h3>
          <p>🔐 OTP:</p>
          <div class="otp" id="otpCode">${otp}</div>
          <button class="copy-btn" onclick="copyOTP()">Copy OTP</button>
        `;
      }

      if (tries > 20) {
        clearInterval(interval);
        resultBox.innerHTML += "<p>⌛ No OTP received</p>";
      }

    }, 5000);

  } catch {
    resultBox.innerHTML = "❌ Error buying number";
  }
});

function copyOTP() {
  const text = document.getElementById("otpCode").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

loadData();

</script>

</body>
</html>
