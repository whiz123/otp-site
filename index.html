<!DOCTYPE html>
<html>
<head>
  <title>Buy OTP Numbers</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #020024, #090979, #000000);
      font-family: Arial, sans-serif;
      color: white;
    }

    .box {
      text-align: center;
      width: 90%;
      max-width: 420px;
      margin: auto;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    select {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    /* ✅ FIXED EMAIL INPUT */
    input {
      width: 100%;
      padding: 13px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      height: 44px; /* keeps it clean, not bulky */
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #00c853, #009624);
      border: none;
      color: white;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 12px;
    }

    button:active {
      transform: scale(0.97);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Buy OTP Numbers 📱</h1>

  <div class="subtitle">
    Fast • Secure • Reliable <br>
    Global virtual numbers for all countries <br>
    Activate accounts instantly with real-time OTP delivery
  </div>

  <select id="country"></select>

  <select id="service"></select>

  <input type="email" id="email" placeholder="Enter your email">

  <button id="buyBtn">Buy OTP</button>

  <div class="footer">
    Trusted worldwide • Instant activation • 24/7 availability
  </div>
</div>

<script>
async function loadData() {
  try {
    const countrySelect = document.getElementById("country");
    const serviceSelect = document.getElementById("service");

    async function fetchWithRetry(url, retries = 3) {
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error("Network error");
          return await res.json();
        } catch (err) {
          if (i === retries - 1) throw err;
          await new Promise(r => setTimeout(r, 2000));
        }
      }
    }

    const countries = await fetchWithRetry("https://otp-backend-srw4.onrender.com/countries");

    countrySelect.innerHTML = "";
    countries.forEach(c => {
      const option = document.createElement("option");
      option.value = c;
      option.text = c.toUpperCase();
      countrySelect.appendChild(option);
    });

    async function loadServices() {
      serviceSelect.innerHTML = "<option>Loading...</option>";

      const selectedCountry = countrySelect.value;

      const services = await fetchWithRetry(
        `https://otp-backend-srw4.onrender.com/services?country=${selectedCountry}`
      );

      serviceSelect.innerHTML = "";

      services.forEach(s => {
        const option = document.createElement("option");
        option.value = s;
        option.text = s;
        serviceSelect.appendChild(option);
      });
    }

    await loadServices();

    countrySelect.addEventListener("change", loadServices);

  } catch (err) {
    alert("Error loading data. Please refresh.");
    console.log(err);
  }
}

document.getElementById("buyBtn").addEventListener("click", () => {
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Please enter your email");
    return;
  }

  alert("Next: price + payment 💰");
});

loadData();
</script>
<script>
async function loadData() {
  try {
    const countrySelect = document.getElementById("country");
    const serviceSelect = document.getElementById("service");
    const priceBox = document.getElementById("priceBox");

    async function fetchWithRetry(url, retries = 3) {
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error("Network error");
          return await res.json();
        } catch (err) {
          if (i === retries - 1) throw err;
          await new Promise(r => setTimeout(r, 2000));
        }
      }
    }

    const countries = await fetchWithRetry("https://otp-backend-srw4.onrender.com/countries");

    countrySelect.innerHTML = "";
    countries.forEach(c => {
      const option = document.createElement("option");
      option.value = c;
      option.text = c.toUpperCase();
      countrySelect.appendChild(option);
    });

    async function loadServices() {
      const selectedCountry = countrySelect.value;

      const services = await fetchWithRetry(
        `https://otp-backend-srw4.onrender.com/services?country=${selectedCountry}`
      );

      serviceSelect.innerHTML = "";

      services.forEach(s => {
        const option = document.createElement("option");
        option.value = s;
        option.text = s;
        serviceSelect.appendChild(option);
      });

      updatePrice();
    }

    // 💰 FAKE PRICE FOR NOW (NEXT WE MAKE REAL)
    function updatePrice() {
      const basePrice = 2000; // simulate 5SIM price
      const profit = 4000;

      const total = basePrice + profit;

      priceBox.innerText = "Price: ₦" + total;
    }

    await loadServices();

    countrySelect.addEventListener("change", loadServices);
    serviceSelect.addEventListener("change", updatePrice);

  } catch (err) {
    alert("Error loading data");
    console.log(err);
  }
}

// 🟢 BUY BUTTON
document.getElementById("buyBtn").addEventListener("click", () => {
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Enter email");
    return;
  }

  alert("Redirecting to payment 💰");
});

loadData();
</script>
  
</body>
</html>
