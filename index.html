<!DOCTYPE html>
<html>
<head>
  <title>Buy OTP Numbers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #020024, #090979, #000000);
      font-family: Arial, sans-serif;
      color: white;
    }

    .box {
      text-align: center;
      width: 90%;
      max-width: 420px;
      margin: auto;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    select {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 13px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      height: 44px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #00c853, #009624);
      border: none;
      color: white;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 12px;
    }

    .price {
      margin-top: 10px;
      font-size: 16px;
      font-weight: bold;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Buy OTP Numbers 📱</h1>

  <div class="subtitle">
    Fast • Secure • Reliable <br>
    Global virtual numbers for all countries <br>
    Activate accounts instantly with real-time OTP delivery
  </div>

  <select id="country"></select>
  <select id="service"></select>

  <input type="email" id="email" placeholder="Enter your email">

  <div id="priceBox" class="price">Price: Loading...</div>

  <button id="buyBtn">Buy OTP</button>

  <div class="footer">
    Trusted worldwide • Instant activation • 24/7 availability
  </div>
</div>

<script>

const API = "https://otp-backend-srw4.onrender.com";

// FORMAT SERVICE NAMES
function formatService(name) {
  return name
    .replace("whatsapp", "WhatsApp")
    .replace("telegram", "Telegram")
    .replace("facebook", "Facebook")
    .replace("instagram", "Instagram")
    .replace("twitter", "Twitter")
    .replace("tiktok", "TikTok")
    .replace("googlevoice", "Google Voice")
    .replace("youtube", "YouTube")
    .replace("google", "Google");
}

// GET REAL PRICE
async function updatePrice() {
  const country = document.getElementById("country").value;
  const service = document.getElementById("service").value;
  const priceBox = document.getElementById("priceBox");

  if (!country || !service) return;

  priceBox.innerText = "Loading price...";

  try {
    const res = await fetch(
      `${API}/price?country=${country}&service=${service}`
    );

    const data = await res.json();

    priceBox.innerText = "Price: ₦" + data.price;

  } catch (err) {
    priceBox.innerText = "Error loading price";
  }
}

// LOAD DATA
async function loadData() {
  try {
    const countrySelect = document.getElementById("country");
    const serviceSelect = document.getElementById("service");

    // LOAD COUNTRIES
    const countries = await fetch(API + "/countries").then(r => r.json());

    countrySelect.innerHTML = "";

    countries.forEach(c => {
      const option = document.createElement("option");
      option.value = c;
      option.text = c.toUpperCase();
      countrySelect.appendChild(option);
    });

    // LOAD SERVICES
    async function loadServices() {
      const country = countrySelect.value;

      serviceSelect.innerHTML = "<option>Loading...</option>";

      const services = await fetch(
        `${API}/services?country=${country}`
      ).then(r => r.json());

      serviceSelect.innerHTML = "";

      services.forEach(s => {
        const option = document.createElement("option");
        option.value = s;
        option.text = formatService(s);
        serviceSelect.appendChild(option);
      });

      await updatePrice();
    }

    await loadServices();

    // EVENTS
    countrySelect.addEventListener("change", loadServices);
    serviceSelect.addEventListener("change", updatePrice);

  } catch (err) {
    alert("Error loading data. Please refresh.");
    console.log(err);
  }
}

document.getElementById("buyBtn").addEventListener("click", async () => {
  const country = document.getElementById("country").value;
  const service = document.getElementById("service").value;
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Enter your email");
    return;
  }

  try {
    alert("⏳ Buying number...");

    const buyRes = await fetch(
      `${API}/buy?country=${country}&service=${service}`
    );

    const buyData = await buyRes.json();

    if (!buyData.id) {
      alert("❌ Failed to buy number");
      console.log(buyData);
      return;
    }

    const orderId = buyData.id;
    const phone = buyData.phone;

    alert("✅ Number: " + phone);

    let tries = 0;

    const interval = setInterval(async () => {
      tries++;

      const checkRes = await fetch(`${API}/check?id=${orderId}`);
      const checkData = await checkRes.json();

      if (checkData.sms && checkData.sms.length > 0) {
        clearInterval(interval);

        const otp = checkData.sms[0].code;

        alert("🎉 OTP: " + otp);
      }

      if (tries > 20) {
        clearInterval(interval);
        alert("⌛ No OTP received");
      }

    }, 5000);

  } catch (err) {
    console.log(err);
    alert("Error buying number");
  }
});

loadData();

</script>

</body>
</html>
