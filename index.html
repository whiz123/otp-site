        return;
      }

      Korapay.initialize({
        key: pk_live_TggCQduimqKmNaHFq9Awp5SNsXsh98rH8W4uCVxq
        reference: "OTP_" + Date.now(),
        amount: 400000,
        currency: "NGN",
