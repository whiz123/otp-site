<!DOCTYPE html>
<html>
<head>
  <title>Payment Successful</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; text-align: center; padding: 30px;">

<h2 id="title">Checking payment...</h2>
<p id="status">Initializing...</p>
<h3 id="otpBox" style="margin-top:20px; color:green;"></h3>

<script>

const API = "https://otp-backend-srw4.onrender.com";

// KEEP YOUR ORDER SYSTEM
function saveOrder(data) {
  const email = localStorage.getItem("user_email") || "guest";
  let orders = JSON.parse(localStorage.getItem("orders_" + email)) || [];

  orders.unshift({
    id: Date.now(),
    number: data.number,
    service: data.service,
    country: data.country,
    status: "waiting",
    otp: null,
    retry_used: false
  });

  localStorage.setItem("orders_" + email, JSON.stringify(orders));
}

// GET URL PARAMS
const urlParams = new URLSearchParams(window.location.search);
const reference = urlParams.get("reference");
const type = urlParams.get("type"); // 🔥 VERY IMPORTANT

// ✅ VERIFY PAYMENT (FIXED)
async function verifyPayment() {

  if (!reference) {
    document.getElementById("title").innerText = "Payment Failed ❌";
    return false;
  }

  try {
    const res = await fetch(`${API}/verify-payment`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ reference })
    });

    const data = await res.json();

    if (!data.success) {
      document.getElementById("title").innerText = "Payment Failed ❌";
      return false;
    }

    document.getElementById("title").innerText = "Payment Successful ✅";

    // 🔥 IF FUND WALLET → STOP HERE
    if (type === "fund") {
      document.getElementById("status").innerText = "Wallet funded successfully 💰";
      return false; // STOP OTP FLOW
    }

    return true;

  } catch (err) {
    document.getElementById("title").innerText = "Error ❌";
    document.getElementById("status").innerText = "Verification failed.";
    return false;
  }
}


// 🔥 OTP FLOW (UNCHANGED BUT FIXED)
const country = localStorage.getItem("country");
const service = localStorage.getItem("service");
const email = localStorage.getItem("user_email");

async function getOTP() {
  try {

    const res = await fetch(`${API}/buy-number`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        country,
        service,
        email,
        price: Number(localStorage.getItem("price"))
      })
    });

    const data = await res.json();

    if (!data.id) {
      document.getElementById("status").innerText = data.error || "Error buying number";
      return;
    }

    document.getElementById("status").innerText = "Number ready ✅";

    document.getElementById("otpBox").innerText =
      "📱 Number: " + data.phone + "\n⏳ Waiting for OTP...";

    saveOrder({
      number: data.phone,
      service: service,
      country: country
    });

    const id = data.id;

    const interval = setInterval(async () => {

      const check = await fetch(`${API}/check?id=${id}`);
      const sms = await check.json();

      if (sms.sms && sms.sms.length > 0) {

        clearInterval(interval);

        const code = sms.sms[0].code;

        const email = localStorage.getItem("user_email") || "guest";
        let orders = JSON.parse(localStorage.getItem("orders_" + email)) || [];

        if (orders.length > 0) {
          orders[0].status = "success";
          orders[0].otp = code;
        }

        localStorage.setItem("orders_" + email, JSON.stringify(orders));

        document.getElementById("status").innerText = "OTP received ✅";

        document.getElementById("otpBox").innerText =
          "📱 Number: " + data.phone +
          "\n🎉 OTP: " + code;

      }

    }, 2000);

  } catch (err) {
    document.getElementById("status").innerText = "Error getting OTP";
  }
}


// 🚀 RUN
verifyPayment().then(ok => {
  if (ok) {
    getOTP();
  }
});

</script>

</body>
</html>
