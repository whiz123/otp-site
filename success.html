<!DOCTYPE html>
<html>
<head>
  <title>Payment Status</title>
</head>

<body style="text-align:center; font-family:Arial; margin-top:100px;">

  <h1 id="status">Verifying payment...</h1>

  <script>
    async function verifyPayment() {
      const urlParams = new URLSearchParams(window.location.search);
      const reference = urlParams.get("reference");

      // ✅ GET EMAIL FROM LOCAL STORAGE
      const email = localStorage.getItem("userEmail");

      if (!reference) {
        document.getElementById("status").innerText = "❌ No reference found";
        return;
      }

      if (!email) {
        document.getElementById("status").innerText = "❌ No email found";
        return;
      }

      try {
        const res = await fetch(`https://otp-backend-srw4.onrender.com/verify-payment?reference=${reference}&email=${email}`);
        const data = await res.json();

        console.log("VERIFY RESPONSE:", data);

        // ✅ ONLY CHECK THIS
        if (data.success === true) {
          document.getElementById("status").innerText = "✅ Payment successful! Wallet funded.";

          // Redirect after 3 seconds
          setTimeout(() => {
            window.location.href = "/";
          }, 3000);

        } else {
          document.getElementById("status").innerText = "❌ " + (data.message || "Payment failed");
        }

      } catch (err) {
        console.log(err);
        document.getElementById("status").innerText = "❌ Error verifying payment";
      }
    }

    verifyPayment();
  </script>

</body>
</html>
