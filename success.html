<!DOCTYPE html>
<html>
<head>
  <title>Payment Successful</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; text-align: center; padding: 30px;">

  <h2>✅ Payment Confirmed</h2>

<p id="status">Initializing your number...</p>

<h3 id="otpBox" style="margin-top:20px; color:green;"></h3>
<button onclick="copyNumber()" style="margin-top:10px; padding:10px 15px; border:none; background:#0a7cff; color:white; border-radius:6px; cursor:pointer;">
📋 Copy Number
</button>
<p>📩 Please use the assigned number below to complete your verification.</p>
<p>⏳ Waiting for incoming OTP. This may take a few seconds...</p>

<script>
function copyNumber() {
  const text = document.getElementById("otpBox").innerText;

  navigator.clipboard.writeText(text);

  document.getElementById("status").innerText = "✅ Number copied";
}
const API = "https://otp-backend-srw4.onrender.com";

const urlParams = new URLSearchParams(window.location.search);
const reference = urlParams.get("reference");

// get saved values
const country = localStorage.getItem("country");
const service = localStorage.getItem("service");

async function getOTP() {
  try {

    // BUY NUMBER
    const res = await fetch(`${API}/buy-number`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
  country,
  service,
  reference
})
    });

    const data = await res.json();

    // ❌ if failed
    if (!data.id) {
      document.getElementById("status").innerText = "Error buying number";
      return;
    }

    // ✅ SHOW NUMBER IMMEDIATELY
    document.getElementById("status").innerText = "Number ready ✅";

    document.getElementById("otpBox").innerText =
      "📱 Number: " + data.phone + "\n⏳ Waiting for OTP...";

    const id = data.id;

    // 🔁 CHECK FOR OTP
    const interval = setInterval(async () => {

      const check = await fetch(`${API}/check?id=${id}`);
      const sms = await check.json();

      // ✅ FIXED FOR 5SIM RESPONSE
      if (sms.sms && sms.sms.length > 0) {

        clearInterval(interval);

        const code = sms.sms[0].code;

        document.getElementById("status").innerText = "OTP received ✅";

        document.getElementById("otpBox").innerText =
          "📱 Number: " + data.phone +
          "\n🎉 OTP: " + code;

      }

    }, 5000);

  } catch (err) {
    document.getElementById("status").innerText = "Error getting OTP";
  }
}

// run immediately
// VERIFY PAYMENT FIRST
fetch(`${API}/verify-payment?ref=${reference}`)
  .then(res => res.json())
  .then(data => {

    if (!data.success) {
      document.getElementById("status").innerText = "❌ Payment not completed";
      return;
    }

    // ✅ Only after successful payment
    getOTP();

  });

</script>

</body>
</html>
