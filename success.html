<!DOCTYPE html>
<html>
<head>
  <title>Payment Successful</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; text-align: center; padding: 30px;">

  <h2>✅ Payment Successful</h2>
  <p id="status">Processing your OTP...</p>

  <h3 id="otpBox" style="margin-top:20px; color:green;"></h3>

<script>

const API = "https://otp-backend-srw4.onrender.com";

// 🔒 GET PAYMENT REFERENCE FROM URL
const urlParams = new URLSearchParams(window.location.search);
const reference = urlParams.get("reference");

// ❌ BLOCK IF NO PAYMENT REFERENCE
if (!reference) {
  document.getElementById("status").innerText = "Invalid access ❌";
  throw new Error("No payment reference");
}

// ❌ BLOCK MULTIPLE USAGE (ANTI REFRESH)
if (localStorage.getItem("otp_used") === reference) {
  document.getElementById("status").innerText = "OTP already used ❌";
  throw new Error("Already used");
}

// get saved values
const country = localStorage.getItem("country");
const service = localStorage.getItem("service");

async function getOTP() {
  try {

    // 🔥 VERIFY PAYMENT FIRST
    const verify = await fetch(`${API}/verify-payment?ref=${reference}`);
    const verifyData = await verify.json();

    if (!verifyData.success) {
      document.getElementById("status").innerText = "Payment not completed ❌";
      return;
    }

    // ✅ MARK THIS PAYMENT AS USED
    localStorage.setItem("otp_used", reference);

    // BUY NUMBER
    const res = await fetch(`${API}/buy-number`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        country,
        service
      })
    });

    const data = await res.json();

    // ❌ if failed
    if (!data.id) {
      document.getElementById("status").innerText = "Error buying number";
      return;
    }

    // ✅ SHOW NUMBER IMMEDIATELY
    document.getElementById("status").innerText = "Number ready ✅";

    document.getElementById("otpBox").innerText =
      "📱 Number: " + data.phone + "\n⏳ Waiting for OTP...";

    const id = data.id;

    // 🔁 CHECK FOR OTP
    const interval = setInterval(async () => {

      const check = await fetch(`${API}/check?id=${id}`);
      const sms = await check.json();

      // ✅ FIXED FOR 5SIM RESPONSE
      if (sms.sms && sms.sms.length > 0) {

        clearInterval(interval);

        const code = sms.sms[0].code;

        document.getElementById("status").innerText = "OTP received ✅";

        document.getElementById("otpBox").innerText =
          "📱 Number: " + data.phone +
          "\n🎉 OTP: " + code;

      }

    }, 5000);

  } catch (err) {
    document.getElementById("status").innerText = "Error getting OTP";
  }
}

// run immediately
getOTP();

</script>

</body>
</html>
