<!DOCTYPE html>
<html>
<head>
  <title>Payment Status</title>
</head>
<body style="text-align:center; font-family:Arial; margin-top:100px;">

  <h1 id="status">Verifying payment...</h1>

  <script>
    async function verifyPayment() {
      const urlParams = new URLSearchParams(window.location.search);
      const reference = urlParams.get("reference");

      if (!reference) {
        document.getElementById("status").innerText = "No reference found ❌";
        return;
      }

      try {
        const res = await fetch("https://otp-backend-srw4.onrender.com/verify-payment", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ reference })
        });

        const data = await res.json();

        if (data.success) {
          document.getElementById("status").innerText = "Payment Successful ✅";
        } else {
          document.getElementById("status").innerText = "Verification failed ❌";
        }

      } catch (err) {
        document.getElementById("status").innerText = "Error verifying payment ❌";
      }
    }

    verifyPayment();
  </script>

</body>
</html>
