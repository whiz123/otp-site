<!DOCTYPE html>
<html>
<head>
  <title>Payment Status</title>
</head>
<body style="text-align:center; font-family:Arial; margin-top:100px;">

  <h1 id="status">Verifying payment...</h1>

  <script>
    async function verifyPayment() {
  const urlParams = new URLSearchParams(window.location.search);
  const reference = urlParams.get("ref");

  if (!reference) {
    document.getElementById("status").innerText = "❌ No reference found";
    return;
  }

  try {
    const res = await fetch(`https://otp-backend-srw4.onrender.com/verify-payment?ref=${reference}`);
    const data = await res.json();

    if (data.success === true) {
      document.getElementById("status").innerText = "✅ Payment Successful! Redirecting...";

      setTimeout(() => {
        window.location.href = "/dashboard.html";
      }, 3000);

    } else {
      document.getElementById("status").innerText = "⏳ Payment received. Updating wallet...";
    }

  } catch (err) {
    document.getElementById("status").innerText = "❌ Error verifying payment";
  }
}

    verifyPayment();
  </script>

</body>
</html>
